<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meraki — Agência Criativa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#F42229;
  --red-dark:#c01820;
  --black:#060607;
  --off-white:#F6F6F6;
  --gray:#111112;
  --gray-mid:#1e1e1f;
  --gray-text:#888;
  --gold:#c9a84c;
}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--off-white);font-family:'Inter',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* CURSOR */
.cursor{width:8px;height:8px;background:var(--red);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .25s,height .25s,background .25s,transform .1s}
.cursor.big{width:36px;height:36px;background:transparent;border:1.5px solid var(--red)}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:28px 64px;transition:all .4s}
nav.scrolled{background:rgba(6,6,7,.95);backdrop-filter:blur(20px);padding:18px 64px;border-bottom:1px solid rgba(244,34,41,.15)}
.nav-logo img{height:36px;display:block}
.nav-links{display:flex;gap:44px;list-style:none}
.nav-links a{color:rgba(246,246,246,.55);text-decoration:none;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;transition:color .3s}
.nav-links a:hover{color:var(--off-white)}
.nav-cta{background:var(--red);color:#fff;padding:11px 28px;font-size:12px;font-weight:700;letter-spacing:1.5px;text-decoration:none;text-transform:uppercase;transition:all .3s;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%)}
.nav-cta:hover{background:var(--red-dark);transform:translateY(-1px)}

/* HERO */
#hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:140px 40px 100px;position:relative;overflow:hidden}
.hero-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(244,34,41,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(244,34,41,.06) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse 70% 60% at 50% 50%,black 30%,transparent 80%)}
.hero-glow{position:absolute;top:20%;left:50%;transform:translateX(-50%);width:800px;height:400px;background:radial-gradient(ellipse,rgba(244,34,41,.22) 0%,transparent 70%);pointer-events:none}

.hero-eyebrow{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(244,34,41,.35);color:var(--red);font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:600;padding:7px 18px;margin-bottom:40px;opacity:0;animation:fadeUp .8s .3s forwards}
.hero-eyebrow-dot{width:5px;height:5px;background:var(--red);border-radius:50%;animation:pulse 1.5s infinite}

.hero-title{font-size:clamp(60px,10vw,148px);font-weight:900;line-height:.92;letter-spacing:-3px;margin-bottom:32px;opacity:0;animation:fadeUp .9s .5s forwards}
.hero-title .line2{display:block;color:transparent;-webkit-text-stroke:1.5px rgba(246,246,246,.3);position:relative}
.hero-title .red-word{color:var(--red);-webkit-text-stroke:0}

.hero-sub{font-size:clamp(14px,1.4vw,17px);color:rgba(246,246,246,.55);max-width:520px;line-height:1.75;margin-bottom:52px;font-weight:400;opacity:0;animation:fadeUp .9s .7s forwards}

.hero-ctas{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;opacity:0;animation:fadeUp .9s .9s forwards}
.btn-red{background:var(--red);color:#fff;padding:16px 40px;font-size:13px;font-weight:700;letter-spacing:1px;text-decoration:none;text-transform:uppercase;transition:all .3s;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);display:inline-block}
.btn-red:hover{background:var(--red-dark);transform:translateY(-2px);box-shadow:0 20px 50px rgba(244,34,41,.35)}
.btn-ghost{border:1px solid rgba(246,246,246,.2);color:var(--off-white);padding:16px 40px;font-size:13px;font-weight:500;letter-spacing:1px;text-decoration:none;text-transform:uppercase;transition:all .3s;display:inline-block}
.btn-ghost:hover{border-color:var(--red);color:var(--red)}

.hero-stats{display:flex;gap:0;margin-top:80px;opacity:0;animation:fadeUp .9s 1.1s forwards;border:1px solid rgba(246,246,246,.07)}
.hero-stat{padding:24px 48px;text-align:center;border-right:1px solid rgba(246,246,246,.07);position:relative}
.hero-stat:last-child{border-right:none}
.hero-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--red);transform:scaleX(0);transition:transform .5s;transform-origin:left}
.hero-stat:hover::before{transform:scaleX(1)}
.stat-n{font-size:36px;font-weight:900;letter-spacing:-1px;display:block;color:var(--off-white)}
.stat-n em{color:var(--red);font-style:normal}
.stat-l{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gray-text);margin-top:4px;display:block}

/* MARQUEE */
.marquee-wrap{overflow:hidden;border-top:1px solid rgba(246,246,246,.06);border-bottom:1px solid rgba(246,246,246,.06);background:var(--gray);padding:18px 0}
.marquee-track{display:flex;gap:0;width:max-content;animation:marquee 28s linear infinite}
.mq-item{font-size:11px;letter-spacing:4px;text-transform:uppercase;font-weight:600;color:rgba(246,246,246,.3);padding:0 40px;display:flex;align-items:center;gap:16px;white-space:nowrap}
.mq-sep{color:var(--red);font-size:14px}

/* COUNTRIES SECTION */
#global{padding:100px 64px;text-align:center;position:relative;overflow:hidden;background:var(--black)}
.global-inner{max-width:1100px;margin:0 auto}
.countries-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:56px}
.country-chip{display:flex;align-items:center;gap:8px;border:1px solid rgba(246,246,246,.1);padding:10px 18px;font-size:12px;letter-spacing:.5px;color:rgba(246,246,246,.6);transition:all .3s;background:rgba(246,246,246,.03)}
.country-chip:hover{border-color:var(--red);color:var(--off-white);background:rgba(244,34,41,.08)}
.country-flag{font-size:18px;line-height:1}
.global-number{font-size:clamp(80px,12vw,160px);font-weight:900;color:transparent;-webkit-text-stroke:1px rgba(244,34,41,.2);letter-spacing:-6px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0}

/* SERVICES */
#servicos{padding:0;background:var(--gray)}
.servicos-inner{max-width:1200px;margin:0 auto;padding:100px 64px}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);margin-top:64px;border:1px solid rgba(246,246,246,.08);background:var(--gray)}
.svc-card{padding:0;border-right:1px solid rgba(246,246,246,.08);border-bottom:1px solid rgba(246,246,246,.08);position:relative;overflow:hidden;transition:background .3s,transform .3s;cursor:default;display:flex;flex-direction:column;background:var(--black)}
.svc-card:nth-child(3n){border-right:none}
.svc-card:hover{background:rgba(244,34,41,.04);transform:translateY(-2px)}
.svc-num{font-size:10px;letter-spacing:4px;color:var(--red);font-weight:700;margin-bottom:12px;display:block;text-transform:uppercase}
.svc-visual{width:100%;overflow:hidden;display:block;background:#07050a;border-bottom:1px solid rgba(244,34,41,.1);flex-shrink:0;line-height:0}
.svc-visual svg{display:block;width:100%;height:auto}
.svc-body{padding:28px 32px;flex:1}
.svc-title{font-size:16px;font-weight:700;margin-bottom:10px;letter-spacing:-.3px;color:var(--off-white)}
.svc-desc{font-size:13px;color:rgba(246,246,246,.5);line-height:1.75}
/* IA card full width */
.svc-ia-wrap{border:1px solid rgba(246,246,246,.08);border-top:none;display:grid;grid-template-columns:1fr 1fr;background:var(--black)}
.svc-ia-visual{border-right:1px solid rgba(246,246,246,.08);overflow:hidden}
.svc-ia-visual svg{display:block;width:100%;height:auto}
.svc-ia-body{display:flex;flex-direction:column;justify-content:center;padding:52px 48px;background:var(--gray)}

/* SOBRE */
#sobre{padding:120px 64px;background:var(--black)}
.sobre-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:100px;align-items:center}
.sobre-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--red);font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.sobre-label::before{content:'';width:28px;height:1px;background:var(--red)}
.sobre-title{font-size:clamp(36px,4vw,56px);font-weight:900;line-height:1.05;letter-spacing:-1.5px;margin-bottom:28px}
.sobre-title em{color:var(--red);font-style:normal}
.sobre-body{color:rgba(246,246,246,.55);font-size:15px;line-height:1.8;margin-bottom:20px}
.sobre-body strong{color:var(--off-white);font-weight:600}
.sobre-visual{position:relative;aspect-ratio:1/1.1}
.sobre-img-frame{position:absolute;inset:0;background:var(--gray-mid);overflow:hidden}

/* PROCESSO */
#processo{padding:100px 64px;background:var(--gray)}
.processo-inner{max-width:1100px;margin:0 auto}
.steps-list{margin-top:64px}
.step-row{display:grid;grid-template-columns:100px 1fr auto;gap:40px;padding:44px 0;border-bottom:1px solid rgba(246,246,246,.06);align-items:start;transition:border-color .3s;cursor:default}
.step-row:hover{border-bottom-color:rgba(244,34,41,.3)}
.step-num-big{font-size:56px;font-weight:900;color:rgba(244,34,41,.15);letter-spacing:-2px;line-height:1;transition:color .4s}
.step-row:hover .step-num-big{color:rgba(244,34,41,.5)}
.step-title{font-size:20px;font-weight:700;margin-bottom:10px;letter-spacing:-.3px}
.step-desc{font-size:14px;color:rgba(246,246,246,.5);line-height:1.75;max-width:560px}
.step-tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--red);border:1px solid rgba(244,34,41,.25);padding:6px 14px;white-space:nowrap;margin-top:6px;align-self:center}

/* RESULTADOS */
#resultados{padding:100px 64px;text-align:center;overflow:hidden;position:relative;background:var(--black)}
.res-inner{max-width:1100px;margin:0 auto;position:relative;z-index:1}
.res-bg-text{position:absolute;font-size:300px;font-weight:900;color:rgba(244,34,41,.03);letter-spacing:-10px;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;pointer-events:none}
.res-grid{display:grid;grid-template-columns:repeat(4,1fr);margin-top:64px;gap:2px}
.res-card{background:var(--gray);padding:52px 28px;position:relative;overflow:hidden}
.res-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),#ff6b6b);transform:scaleX(0);transform-origin:left;transition:transform .5s}
.res-card:hover::before{transform:scaleX(1)}
.res-big{font-size:56px;font-weight:900;letter-spacing:-2px;line-height:1;background:linear-gradient(135deg,#fff,rgba(246,246,246,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.res-big em{-webkit-text-fill-color:var(--red);font-style:normal}
.res-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(246,246,246,.4);margin-top:10px}

/* DEPOIMENTOS */
#depoimentos{padding:100px 64px;background:var(--gray)}
.depo-inner{max-width:1200px;margin:0 auto}
.depo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:64px}
.depo-card{background:var(--black);padding:44px 36px;position:relative;transition:transform .3s}
.depo-card:hover{transform:translateY(-4px)}
.depo-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px}
.depo-logo-area{display:flex;align-items:center;gap:10px}
.depo-company-badge{width:44px;height:44px;background:var(--red);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%)}
.depo-company-name{font-size:12px;font-weight:700;letter-spacing:.5px}
.depo-company-sector{font-size:10px;color:rgba(246,246,246,.4);letter-spacing:1px;text-transform:uppercase}
.depo-country{font-size:20px}
.depo-stars{color:var(--red);letter-spacing:2px;font-size:11px;margin-bottom:16px}
.depo-text{font-size:14px;color:rgba(246,246,246,.6);line-height:1.8;font-style:italic;margin-bottom:28px}
.depo-author{border-top:1px solid rgba(246,246,246,.06);padding-top:20px;display:flex;align-items:center;justify-content:space-between}
.depo-name{font-size:13px;font-weight:700}
.depo-role{font-size:11px;color:rgba(246,246,246,.4);margin-top:2px}
.depo-result{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--red);font-weight:700}

/* CTA FINAL */
#cta-final{padding:160px 64px;text-align:center;position:relative;overflow:hidden;background:var(--black)}
.cta-bg-glow{position:absolute;inset:0;background:radial-gradient(ellipse 80% 80% at 50% 50%,rgba(244,34,41,.15) 0%,transparent 70%);pointer-events:none}
.cta-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(244,34,41,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(244,34,41,.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 80%)}
.cta-inner{position:relative;z-index:1}
.cta-title{font-size:clamp(52px,9vw,120px);font-weight:900;line-height:.9;letter-spacing:-3px;margin-bottom:28px}
.cta-title em{color:var(--red);font-style:normal;display:block}
.cta-sub{font-size:16px;color:rgba(246,246,246,.5);max-width:460px;margin:0 auto 56px;line-height:1.7}
.cta-buttons{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn-wpp{background:var(--red);color:#fff;padding:18px 48px;font-size:13px;font-weight:700;letter-spacing:1px;text-decoration:none;text-transform:uppercase;display:inline-flex;align-items:center;gap:12px;transition:all .3s;clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,0 100%)}
.btn-wpp:hover{background:var(--red-dark);transform:translateY(-2px);box-shadow:0 24px 60px rgba(244,34,41,.4)}

/* FOOTER */
footer{background:var(--gray-mid);padding:56px 64px;border-top:1px solid rgba(246,246,246,.05)}
.footer-inner{max-width:1200px;margin:0 auto}
.footer-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:48px;gap:40px;flex-wrap:wrap}
.footer-logo img{height:32px;opacity:.85}
.footer-desc{font-size:13px;color:rgba(246,246,246,.4);line-height:1.7;max-width:280px;margin-top:16px}
.footer-col h4{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:20px;font-weight:700}
.footer-col ul{list-style:none;display:flex;flex-direction:column;gap:12px}
.footer-col a{color:rgba(246,246,246,.45);text-decoration:none;font-size:13px;transition:color .3s}
.footer-col a:hover{color:var(--off-white)}
.footer-bottom{border-top:1px solid rgba(246,246,246,.05);padding-top:28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.footer-copy{font-size:11px;color:rgba(246,246,246,.25);letter-spacing:.5px}

/* SECTION HEADERS */
.section-eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:12px;justify-content:center}
.section-eyebrow::before,.section-eyebrow::after{content:'';flex:0 0 28px;height:1px;background:rgba(244,34,41,.4)}
.section-title-center{font-size:clamp(36px,5vw,64px);font-weight:900;letter-spacing:-2px;line-height:1;text-align:center}
.section-sub{font-size:15px;color:rgba(246,246,246,.45);text-align:center;max-width:500px;margin:16px auto 0}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes marquee{to{transform:translateX(-50%)}}
.reveal{opacity:0;transform:translateY(36px);transition:opacity .7s ease,transform .7s ease}
.reveal.vis{opacity:1;transform:translateY(0)}
.reveal-delay-1{transition-delay:.1s}
.reveal-delay-2{transition-delay:.2s}
.reveal-delay-3{transition-delay:.3s}

/* MOBILE RESPONSIVE - CORRIGIDO */
@media(max-width:960px){
  nav{padding:20px 24px}
  nav.scrolled{padding:14px 24px}
  .nav-links,.nav-cta{display:none}
  #hero{padding:120px 24px 80px}
  .hero-stat{padding:20px 28px}
  .stat-n{font-size:28px}
  #global,#servicos .servicos-inner,#sobre,#processo,#resultados,#depoimentos,#cta-final,footer{padding-left:24px;padding-right:24px}
  .services-grid{grid-template-columns:1fr}
  .svc-card{border-right:none}
  .svc-ia-wrap{grid-template-columns:1fr}
  .svc-ia-visual{border-right:none;border-bottom:1px solid rgba(246,246,246,.08)}
  .svc-ia-body{padding:32px 24px}
  .sobre-inner{grid-template-columns:1fr;gap:48px}
  .res-grid{grid-template-columns:repeat(2,1fr)}
  .depo-grid{grid-template-columns:1fr}
  .step-row{grid-template-columns:60px 1fr;gap:20px}
  .step-tag{display:none}
  .hero-stats{flex-direction:column;gap:0}
  .hero-stat{border-right:none;border-bottom:1px solid rgba(246,246,246,.07)}
  .sobre-badge-wrap{right:0;bottom:-10px}
  .countries-grid{gap:8px}
  .country-chip{padding:8px 12px}
  footer .footer-top{flex-direction:column}
  .footer-bottom{flex-direction:column;text-align:center}
}

/* EXTRA SMALL DEVICES - MOBILE OTIMIZADO */
@media(max-width:640px){
  nav{padding:16px 16px}
  nav.scrolled{padding:12px 16px}
  
  #hero{padding:100px 16px 60px}
  .hero-title{font-size:clamp(40px,8vw,80px)}
  .hero-sub{font-size:clamp(13px,1.2vw,15px)}
  .hero-ctas{gap:12px}
  .btn-red, .btn-ghost{padding:14px 28px;font-size:12px}
  
  .hero-stats{flex-direction:column;gap:0;margin-top:60px}
  .hero-stat{padding:16px 20px}
  .stat-n{font-size:24px}
  .stat-l{font-size:9px}
  
  .marquee-wrap{padding:14px 0}
  .mq-item{padding:0 20px;font-size:10px}
  
  #global{padding:80px 16px}
  .global-inner{max-width:100%}
  .countries-grid{gap:6px;margin-top:40px}
  .country-chip{padding:7px 10px;font-size:11px}
  .global-number{font-size:clamp(60px,10vw,100px)}
  
  #servicos .servicos-inner{padding:80px 16px}
  .services-grid{margin-top:48px}
  .svc-card{padding:0}
  .svc-body{padding:20px 16px}
  .svc-title{font-size:15px}
  .svc-desc{font-size:12px}
  .svc-ia-body{padding:24px 16px}
  
  #sobre{padding:80px 16px}
  .sobre-inner{gap:32px}
  .sobre-title{font-size:clamp(28px,3.5vw,40px)}
  .sobre-body{font-size:14px}
  
  #processo{padding:80px 16px}
  .processo-inner{max-width:100%}
  .steps-list{margin-top:48px}
  .step-row{grid-template-columns:50px 1fr;gap:16px;padding:32px 0}
  .step-num-big{font-size:40px}
  .step-title{font-size:16px}
  .step-desc{font-size:13px}
  
  #resultados{padding:80px 16px}
  .res-inner{max-width:100%}
  .res-grid{grid-template-columns:1fr;margin-top:48px;gap:1px}
  .res-card{padding:40px 20px}
  .res-big{font-size:40px}
  .res-label{font-size:10px}
  
  #depoimentos{padding:80px 16px}
  .depo-inner{padding:0}
  .depo-grid{gap:1px;margin-top:48px}
  .depo-card{padding:32px 20px}
  .depo-top{margin-bottom:20px}
  .depo-company-badge{width:40px;height:40px;font-size:12px}
  .depo-company-name{font-size:11px}
  .depo-text{font-size:13px;margin-bottom:20px}
  .depo-author{padding-top:16px}
  .depo-name{font-size:12px}
  
  #cta-final{padding:100px 16px}
  .cta-title{font-size:clamp(36px,7vw,80px)}
  .cta-sub{font-size:14px;margin:0 auto 40px}
  .cta-buttons{gap:12px}
  .btn-wpp{padding:16px 32px;font-size:12px;gap:8px}
  
  footer{padding:40px 16px}
  .footer-top{margin-bottom:32px;gap:24px}
  .footer-logo img{height:28px}
  .footer-desc{font-size:12px;max-width:100%}
  .footer-col h4{font-size:9px;margin-bottom:16px}
  .footer-col ul{gap:10px}
  .footer-col a{font-size:12px}
  .footer-bottom{padding-top:20px;gap:12px}
  .footer-copy{font-size:10px}
